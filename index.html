<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0b0b0c">
  <meta name="description" content="One More Day — survie post-apocalyptique à Salon-de-Provence. Survivre un jour de plus.">
  <title>One More Day</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <div id="topbar" class="topbar hidden">
      <span class="tb-gauche">
        <span class="heure" id="hud-time">Jour 1 — 08:00</span>
        <span class="poids-jauge" id="hud-poids" title="Charge portée"><i></i></span>
      </span>
      <span class="lieu" id="hud-lieu"></span>
    </div>
    <div id="screen" class="screen"></div>
    <div id="moodles" class="moodles hidden"></div>
    <!-- Coin bas GAUCHE : actions sur la case (gros) au-dessus du menu du jeu (journal, options) -->
    <div id="fabs-jeu" class="fabs fabs-gauche hidden">
      <button class="fab moyen" id="btn-actions" title="Actions sur la case sélectionnée"></button>
      <div class="fabs-jeu-bas">
        <button class="fab small" id="btn-journal" title="Journal"></button>
        <button class="fab small" id="btn-options" title="Options"></button>
      </div>
    </div>
    <!-- Coin bas DROIT : le personnage (corps, inventaire + fabrication) -->
    <div id="fabs" class="fabs fabs-droite hidden">
      <button class="fab principal" id="btn-perso" title="Corps"></button>
      <button class="fab principal" id="btn-inv" title="Inventaire"></button>
    </div>
    <div id="panel" class="panel hidden"></div>
    <div id="evt" class="evt-fenetre hidden"></div>
    <div id="attente" class="attente hidden" aria-hidden="true">
      <div class="attente-box"><div class="attente-spinner"></div><div class="attente-label"></div><div class="attente-bar"><i></i></div><button class="attente-annuler" type="button">Annuler</button></div>
    </div>
    <!-- Fouille continue : barre qui se remplit + objets trouvés au fil de l'eau -->
    <div id="fouille-progress" class="fouille-ov hidden" aria-hidden="true">
      <div class="fouille-box">
        <div class="fouille-spinner"></div>
        <div class="fouille-label">Tu fouilles…</div>
        <div class="fouille-bar"><i></i></div>
        <div class="fouille-trouves" id="fouille-trouves"></div>
        <button class="fouille-annuler" type="button">Arrêter et ramasser</button>
      </div>
    </div>
    <div id="toast" class="toast hidden"></div>
    <!-- Voile d'alerte d'infection : pulse périodiquement tant qu'une blessure est infectée -->
    <div id="voile-infection" aria-hidden="true"></div>
  </div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
